<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettelkasten — 제텔카스텐 메모</title>
    <meta name="description" content="제텔카스텐 스타일 메모 앱. 양방향 링크, 그래프 뷰, 태그, 검색으로 지식을 연결하세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- ═══════════ 사이드바 ═══════════ -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">
                <span class="logo-icon">🌳</span>
                <span class="logo-text">나를기억</span>
            </h1>
            <button id="btn-new-note" class="btn-primary" title="새 메모 (Ctrl+N)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
            <button id="btn-home" class="btn-home" title="초기 화면으로 (홈)">
                🏡
            </button>
            <button id="btn-theme" class="btn-theme" title="테마 변경 (클래식/다크/라이트)">
                🎨
            </button>
            <button id="btn-export" class="btn-export" title="모두 내보내기 및 초기화">
                📤
            </button>
            <button id="btn-import" class="btn-import" title="데이터 가져오기">
                📥
            </button>
            <button id="btn-help" class="btn-help" title="사용법 도움말">
                ❓
            </button>
            <input type="file" id="import-input" accept=".json" style="display:none">
        </div>

        <!-- 검색 -->
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <label for="search-input" class="sr-only">메모 검색</label>
            <input id="search-input" type="text" placeholder="메모 검색..." autocomplete="off">
        </div>

        <!-- 태그 클라우드 -->
        <div id="tag-cloud" class="tag-cloud">
            <h3 class="section-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
                    <line x1="7" y1="7" x2="7.01" y2="7" />
                </svg>
                태그
            </h3>
            <div id="tag-list" class="tag-list"></div>
        </div>

        <!-- 메모 목록 -->
        <div class="note-list-container">
            <h3 class="section-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                메모 <span id="note-count" class="note-count">0</span>
            </h3>
            <ul id="note-list" class="note-list"></ul>
        </div>
    </aside>

    <!-- ═══════════ 메인 영역 ═══════════ -->
    <main id="main-area" class="main-area">
        <!-- 탭 바 -->
        <nav class="tab-bar">
            <div class="tab-bar-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                <span id="tab-bar-label">에디터</span>
            </div>
            <button id="btn-toggle-sidebar" class="tab tab-icon" title="사이드바 토글">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                </svg>
            </button>
        </nav>

        <!-- 컨텐츠 영역 (에디터 + 그래프 분할) -->
        <div class="content-split">

            <!-- 에디터 패널 (초기에는 비활성) -->
            <section id="panel-editor" class="panel panel-editor">
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📝</div>
                    <h2>메모를 선택하거나 새로 만드세요</h2>
                    <p><kbd>Ctrl</kbd> + <kbd>N</kbd> 을 눌러 새 메모를 만들 수 있습니다</p>
                    <button id="btn-new-note-main" class="btn-new-note-main">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        새 메모 만들기
                    </button>
                    <p class="tip">💡 본문에 <code>[[메모 제목]]</code> 을 입력하면 다른 메모와 연결됩니다</p>
                </div>
                <div id="editor-area" class="editor-area hidden">
                    <div class="editor-toolbar">
                        <label for="note-title" class="sr-only">메모 제목</label>
                        <input id="note-title" type="text" class="note-title-input" placeholder="메모 제목..." autofocus>
                        <div class="toolbar-actions">
                            <button id="btn-new-note-editor" class="btn-icon btn-new-inline" title="새 메모 (Ctrl+N)">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round">
                                    <line x1="12" y1="5" x2="12" y2="19" />
                                    <line x1="5" y1="12" x2="19" y2="12" />
                                </svg>
                            </button>
                            <span id="save-status" class="save-status">저장됨</span>
                            <button id="btn-upload-image" class="btn-icon btn-image" title="이미지 업로드">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <polyline points="21 15 16 10 5 21" />
                                </svg>
                            </button>
                            <button id="btn-toggle-preview" class="btn-icon btn-preview" title="미리보기 토글 (Ctrl+P)">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                            <button id="btn-toggle-graph-editor" class="btn-icon btn-graph" title="그래프 보기 토글">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <circle cx="12" cy="12" r="3" />
                                    <path d="M3 3v18h18" />
                                    <path d="m18 9-5 5-2-2-5 5" />
                                </svg>
                            </button>
                            <button id="btn-delete-note" class="btn-icon btn-danger" title="메모 삭제">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <polyline points="3 6 5 6 21 6" />
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <label for="note-body" class="sr-only">메모 내용</label>
                    <textarea id="note-body" class="note-body"
                        placeholder="여기에 메모를 작성하세요...&#10;&#10;💡 [[다른 메모 제목]] 으로 링크를 만들 수 있습니다&#10;💡 #태그 로 분류할 수 있습니다"></textarea>
                    <div id="note-preview" class="note-preview hidden"></div>

                    <!-- 이미지 갤러리 -->
                    <div id="image-gallery" class="image-gallery hidden"></div>
                    <label for="image-input" class="sr-only">이미지 선택</label>
                    <input type="file" id="image-input" accept="image/*" multiple style="display:none">

                    <!-- 백링크 섹션 -->
                    <div id="backlinks-section" class="backlinks-section hidden">
                        <h3 class="section-title">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3" />
                                <line x1="8" y1="12" x2="16" y2="12" />
                            </svg>
                            백링크
                        </h3>
                        <ul id="backlink-list" class="backlink-list"></ul>
                    </div>
                </div>
            </section>

            <!-- 그래프 패널 -->
            <section id="panel-graph" class="panel panel-graph active">
                <canvas id="graph-canvas"></canvas>
                <div id="graph-tooltip" class="graph-tooltip hidden"></div>
            </section>
        </div> <!-- /.content-split -->
    </main>

    <!-- 링크 자동완성 팝업 -->
    <div id="autocomplete-popup" class="autocomplete-popup hidden">
        <ul id="autocomplete-list"></ul>
    </div>

    <!-- 도움말 팝업 -->
    <div id="help-popup" class="help-popup hidden glass-effect">
        <div class="help-popup-content">
            <div class="help-loading">도움말 로딩 중...</div>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- 백업 도우미 모달 -->
    <div id="backup-modal" class="modal-overlay hidden">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h3>📤 데이터 백업 도우미</h3>
                <button id="btn-close-modal" class="btn-icon">✕</button>
            </div>
            <div class="modal-body">
                <p>파일을 찾기 어려우신 경우, 아래 데이터를 전체 복사하여 메모장 등에 안전하게 보관해 주세요.</p>
                <textarea id="backup-text" readonly></textarea>
                <div class="modal-actions">
                    <button id="btn-copy-backup" class="btn-primary-large">📋 클립보드에 복사</button>
                    <p class="modal-tip">복사 완료 후 '닫기'를 누르면 데이터가 초기화됩니다.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
